<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="all">
  <title>{% block title %}ЛоялUP{% endblock %}</title>
  <style>
    :root { --ink:#1f2937; --ink2:#384150; --muted:#6b7280; --line:#eef1f5; --brand:#7c3aed; }
    * { box-sizing: border-box; }
    body { margin:0; background:#f6f7fb; color:var(--ink2);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; line-height:1.6; }
    .wrap { max-width:820px; margin:0 auto; padding:32px 20px 64px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:32px 30px;
      box-shadow:0 1px 3px rgba(16,24,40,.04); }
    h1 { color:var(--ink); font-size:26px; font-weight:800; margin:0 0 6px; }
    .upd { color:var(--muted); font-size:13px; margin:0 0 24px; }
    h2 { color:var(--ink); font-size:18px; font-weight:700; margin:28px 0 8px; }
    p, li { font-size:15px; }
    ul { padding-left:22px; }
    a { color:var(--brand); }
    .foot { color:var(--muted); font-size:13px; margin-top:32px; padding-top:18px; border-top:1px solid var(--line); }
    .brand { display:inline-flex; align-items:center; gap:8px; font-weight:800; color:var(--brand); margin-bottom:18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">🎁 ЛоялUP</div>
      {% block body %}{% endblock %}
      <div class="foot">
        ЛоялUP — платформа управления программой лояльности для ресторанов и кафе.<br>
        Вопросы по обработке данных: <a href="mailto:levon.kirakosov@mail.ru">levon.kirakosov@mail.ru</a>.
      </div>
    </div>
  </div>
</body>
</html>
